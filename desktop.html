<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>고팡 마켓</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<meta name="theme-color" content="#1A1F29"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:           #F8F9FA;
  --bg-elevated:  #FFFFFF;
  --bg-subtle:    #F1F3F5;
  --sep:          #E4E4E7;
  --sep-strong:   #D1D5DB;
  --label:        #111827;
  --label-2:      #374151;
  --label-3:      #6B7280;
  --label-4:      #9CA3AF;
  --tint:         #3ECF8E;
  --tint-dark:    #29A374;
  --tint-dim:     #ECFDF5;
  --sidebar-bg:   #1A1F29;
  --sidebar-w:    48px;
  --sidebar-w-ex: 220px;
  --sidebar-item-h: 36px;
  --sidebar-hover: rgba(255,255,255,0.07);
  --sidebar-active: rgba(62,207,142,0.15);
  --header-h:     48px;
  --r-sm: 4px; --r-md: 6px; --r-lg: 8px; --r-xl: 12px;
  --font: 'Noto Sans KR', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--label); font-family: var(--font); overflow: hidden; }

/* ── 레이아웃 ─────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  height: 100vh;
  transition: grid-template-columns .2s ease;
}
.layout.expanded { grid-template-columns: var(--sidebar-w-ex) 1fr; }

/* ── 헤더 ─────────────────────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  background: #fff;
  border-bottom: 1px solid var(--sep);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  z-index: 100; height: var(--header-h);
}
.header-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700; color: var(--label);
  text-decoration: none; white-space: nowrap;
}
.header-logo-icon {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--tint);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.header-logo-sub { color: var(--label-3); font-size: 12px; font-weight: 400; }
.header-sep { width: 1px; height: 20px; background: var(--sep); }
.header-badge {
  background: var(--tint-dim); color: var(--tint-dark);
  border: 1px solid #A7F3D0; border-radius: 99px;
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  font-family: var(--font-mono);
}
.header-spacer { flex: 1; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: var(--r-md);
  border: 1px solid var(--sep); background: transparent;
  color: var(--label-2); font-size: 12px; font-family: var(--font);
  cursor: pointer; transition: background .15s, border-color .15s; white-space: nowrap;
}
.header-btn:hover { background: var(--bg-subtle); border-color: var(--sep-strong); }
.header-btn.primary { background: var(--tint); border-color: var(--tint); color: #000; font-weight: 600; }
.header-btn.primary:hover { background: var(--tint-dark); border-color: var(--tint-dark); }
.auth-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--label-3); font-family: var(--font-mono); }
.auth-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--tint); }

/* ── 사이드바 ─────────────────────────────────────────────── */
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 90;
  transition: width .2s ease;
  width: var(--sidebar-w);
}
.layout.expanded .sidebar { width: var(--sidebar-w-ex); }

.sidebar-section { padding: 6px 0; }
.sidebar-section + .sidebar-section { border-top: 1px solid rgba(255,255,255,0.06); }
.sidebar-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: rgba(255,255,255,0.25);
  padding: 8px 14px 4px; white-space: nowrap;
  opacity: 0; transition: opacity .15s;
}
.layout.expanded .sidebar-label { opacity: 1; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  height: var(--sidebar-item-h); padding: 0 13px;
  border-radius: var(--r-md); margin: 1px 6px;
  cursor: pointer; color: rgba(255,255,255,0.55);
  font-size: 13px; font-weight: 500;
  transition: background .15s, color .15s;
  text-decoration: none; white-space: nowrap; overflow: hidden;
}
.nav-item:hover   { background: var(--sidebar-hover); color: rgba(255,255,255,0.85); }
.nav-item.active  { background: var(--sidebar-active); color: var(--tint); }
.nav-item.active .nav-icon { color: var(--tint); }
.nav-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; color: rgba(255,255,255,0.4); transition: color .15s; }
.nav-label { opacity: 0; transition: opacity .15s .05s; font-size: 13px; }
.layout.expanded .nav-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ── 메인 ─────────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.content-header {
  background: #fff; border-bottom: 1px solid var(--sep);
  padding: 0 24px; display: flex; align-items: center;
  height: 40px; flex-shrink: 0;
}
.tab-btn {
  padding: 0 14px; height: 40px; border: none; background: transparent;
  font-family: var(--font); font-size: 13px; color: var(--label-3);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--label); border-bottom-color: var(--tint); font-weight: 600; }
.tab-btn:hover:not(.active) { color: var(--label-2); }

.content-body {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-content: start;
}

/* ── 채팅 ─────────────────────────────────────────────────── */
.chat-panel {
  background: #fff; border: 1px solid var(--sep); border-radius: var(--r-xl);
  display: flex; flex-direction: column; overflow: hidden;
  height: calc(100vh - var(--header-h) - 40px - 40px);
}
.chat-header {
  padding: 12px 16px; border-bottom: 1px solid var(--sep);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.chat-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--tint-dim); display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.chat-title { font-size: 13px; font-weight: 600; color: var(--label); }
.chat-sub   { font-size: 11px; color: var(--label-3); }
.chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.msg-row { display: flex; gap: 8px; }
.msg-row.user { flex-direction: row-reverse; }
.bubble {
  max-width: 78%; padding: 9px 13px; border-radius: var(--r-xl);
  font-size: 13px; line-height: 1.65; word-break: break-word;
}
.bubble-ai   { background: var(--bg-subtle); color: var(--label); border-radius: 4px var(--r-xl) var(--r-xl) var(--r-xl); }
.bubble-user { background: var(--tint); color: #000; border-radius: var(--r-xl) 4px var(--r-xl) var(--r-xl); font-weight: 500; }
.chat-input-row {
  padding: 10px 14px; border-top: 1px solid var(--sep);
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.chat-textarea {
  flex: 1; border: 1px solid var(--sep); border-radius: var(--r-lg);
  padding: 7px 11px; font-family: var(--font); font-size: 13px;
  color: var(--label); background: var(--bg-subtle);
  resize: none; outline: none; line-height: 1.5; max-height: 96px;
  transition: border-color .15s;
}
.chat-textarea:focus { border-color: var(--tint); background: #fff; }
.chat-send {
  width: 32px; height: 32px; border-radius: var(--r-md);
  background: var(--tint); border: none; color: #000; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.chat-send:hover:not(:disabled) { background: var(--tint-dark); }
.chat-send:disabled { background: var(--sep); color: var(--label-4); cursor: not-allowed; }

/* ── 우측 카드 ───────────────────────────────────────────── */
.side-panel { display: flex; flex-direction: column; gap: 14px; }
.card { background: #fff; border: 1px solid var(--sep); border-radius: var(--r-xl); overflow: hidden; }
.card-header {
  padding: 12px 14px 10px; border-bottom: 1px solid var(--sep);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--label); }
.card-action { font-size: 11px; color: var(--tint-dark); cursor: pointer; font-weight: 500; background: none; border: none; font-family: var(--font); }
.card-body { padding: 12px 14px; }

.service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.svc-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 9px 4px; border-radius: var(--r-lg); border: 1px solid var(--sep);
  background: var(--bg-subtle); cursor: pointer; font-family: var(--font);
  transition: background .15s, border-color .15s;
}
.svc-btn:hover { background: var(--tint-dim); border-color: var(--tint); }
.svc-icon { font-size: 17px; }
.svc-name { font-size: 10px; color: var(--label-2); font-weight: 500; }

.pdv-item {
  padding: 9px 0; border-bottom: 1px solid var(--sep);
  display: flex; gap: 9px; align-items: flex-start;
}
.pdv-item:last-child { border-bottom: none; }
.pdv-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--tint); margin-top: 4px; flex-shrink: 0; }
.pdv-text { font-size: 12px; color: var(--label-2); line-height: 1.5; }
.pdv-time { font-size: 10px; color: var(--label-4); font-family: var(--font-mono); }

/* ── 로딩 ─────────────────────────────────────────────────── */
#auth-loading {
  position: fixed; inset: 0; z-index: 9999;
  background: #0f1117;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
}
.ld-dots { display: flex; gap: 6px; }
.ld-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--tint); animation: ldB .8s infinite alternate; }
.ld-dot:nth-child(2){ animation-delay:.2s }
.ld-dot:nth-child(3){ animation-delay:.4s }
@keyframes ldB { to { transform: translateY(-7px); opacity: .3; } }
.ld-text { font-size: 12px; color: rgba(255,255,255,.35); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--sep-strong); border-radius: 2px; }
</style>
</head>

<script>
const SUPA_URL  = 'https://ebbecjfrwaswbdybbgiu.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYmVjamZyd2Fzd2JkeWJiZ2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjE5ODQsImV4cCI6MjA5NTEzNzk4NH0.H2ahQKtWdSke04Pdi3hDY86pdTx7UUKPUpQMlS_zciA';
const HDR = { 'apikey': SUPA_ANON, 'Authorization': 'Bearer ' + SUPA_ANON };
const DEEPSEEK_EP = 'https://gopang-proxy.tensor-city.workers.dev/deepseek';

let _user = null;
let _chatHistory = [];

// ── 인증 콜백 ─────────────────────────────────────────────
window._onGopangAuth = async function(user) {
  if (!user) return;
  _user = user;
  document.getElementById('auth-loading').style.display = 'none';
  const lvEl = document.getElementById('auth-level');
  if (lvEl) {
    const colors = { L0:'#6b7280', L1:'#00bcd4', L2:'#3ecf8e', L3:'#ff9800' };
    lvEl.textContent = user.level;
    lvEl.style.color = colors[user.level] || colors.L0;
  }
  setTimeout(loadPDVSummary, 800);
};

// ── 탭 ────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const tb = document.getElementById('tab-' + tab);
  if (tb) tb.classList.add('active');
}

// ── 채팅 ──────────────────────────────────────────────────
function autoResizeChat(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
  document.getElementById('chat-send').disabled = !el.value.trim();
}
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}
function appendChatMsg(role, text, id) {
  const msgs = document.getElementById('chat-messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');
  if (id) row.id = id;
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'bubble-user' : 'bubble-ai');
  bubble.textContent = text;
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  appendChatMsg('user', text);
  input.value = ''; input.style.height = 'auto';
  document.getElementById('chat-send').disabled = true;
  _chatHistory.push({ role: 'user', content: text });
  const tid = 'typing-' + Date.now();
  appendChatMsg('ai', '…', tid);
  try {
    const res = await fetch(DEEPSEEK_EP, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '당신은 고팡 마켓 AI 비서입니다. 구매, 판매, 시장 분석, 상품 추천, 재고 관리를 전문으로 합니다. 한국어로 간결하고 전문적으로 답변하세요.' },
          ..._chatHistory
        ],
        max_tokens: 1000, stream: false,
      })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '응답을 받지 못했습니다.';
    _chatHistory.push({ role: 'assistant', content: reply });
    document.getElementById(tid)?.remove();
    appendChatMsg('ai', reply);
    if (_user?.ipv6) _sendPdvReport(_user, { summary: `마켓 AI 채팅: ${text.slice(0,50)}`, goal: 'AI 마켓 비서 상담' });
  } catch(e) {
    document.getElementById(tid)?.remove();
    appendChatMsg('ai', '오류: ' + e.message);
  }
}
function newChat() {
  _chatHistory = [];
  document.getElementById('chat-messages').innerHTML = '';
  appendChatMsg('ai', '새 채팅을 시작합니다. 무엇을 도와드릴까요?');
}

// ── PDV ───────────────────────────────────────────────────
async function _sendPdvReport(user, action) {
  try {
    await fetch('https://gopang-proxy.tensor-city.workers.dev/pdv/report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ report: {
        svc: 'market', type: 'action',
        who:   { ipv6: user.ipv6, role: 'user' },
        when:  { period_start: new Date().toISOString(), period_end: new Date().toISOString() },
        where: { svc_url: location.href },
        what:  { summary: action.summary },
        how:   { method: 'subsystem-auth', auth_level: user.level },
        why:   { goal: action.goal },
      }})
    });
  } catch(e) { console.warn('[PDV]', e.message); }
}
async function loadPDVSummary() {
  const el = document.getElementById('pdv-summary');
  if (!_user?.ipv6) return;
  el.innerHTML = '<div style="text-align:center;color:var(--label-4);font-size:12px;padding:8px">로딩 중…</div>';
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/pdv_log?order=created_at.desc&limit=5`, { headers: HDR });
    const rows = await res.json();
    if (!rows.length) { el.innerHTML = '<div style="text-align:center;color:var(--label-4);font-size:12px;padding:12px 0">기록 없음</div>'; return; }
    el.innerHTML = rows.map(r => `
      <div class="pdv-item">
        <div class="pdv-dot"></div>
        <div>
          <div class="pdv-text">${r.summary || r.what?.summary || '—'}</div>
          <div class="pdv-time">${r.created_at ? new Date(r.created_at).toLocaleString('ko-KR') : ''}</div>
        </div>
      </div>`).join('');
  } catch(e) { el.innerHTML = '<div style="text-align:center;color:var(--label-4);font-size:12px;padding:8px">조회 실패</div>'; }
}

function openSearch() {
  const q = prompt('검색어:');
  if (q) { document.getElementById('chat-input').value = q; sendChat(); }
}

// Ctrl+K 단축키
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});
</script>
