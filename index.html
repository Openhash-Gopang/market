<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>고팡 마켓</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="고팡 마켓"/>
<meta name="theme-color" content="#1A1F29"/>
<style>
  body { margin:0; background:#1A1F29;
    display:flex; align-items:center; justify-content:center;
    height:100vh; font-family:-apple-system,sans-serif; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3ECF8E;
    display:inline-block; margin:0 3px;
    animation:bounce .8s infinite alternate; }
  .dot:nth-child(2){ animation-delay:.2s }
  .dot:nth-child(3){ animation-delay:.4s }
  @keyframes bounce{ to{ transform:translateY(-8px); opacity:.4 } }
</style>
</head>
<body>
<div>
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>
<script>
(function() {
  const params  = new URLSearchParams(location.search);
  const isGwp   = params.get('gwp') === '1';
  const hasCtx  = !!params.get('ctx');
  const isMobile = /Mobi|Android|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i
                     .test(navigator.userAgent)
                  || window.innerWidth < 900;
  const target = (isGwp || hasCtx || isMobile) ? 'webapp.html' : 'desktop.html';
  location.replace(target + (location.search || ''));
})();
</script>
</body>
</html>
